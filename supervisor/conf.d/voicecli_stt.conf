[program:voicecli_stt]
command=%(ENV_HOME)s/projects/voiceCLI/supervisor/scripts/run_stt.sh
directory=%(ENV_HOME)s/projects/voiceCLI
environment=HOME="%(ENV_HOME)s",PATH="%(ENV_HOME)s/.local/bin:%(ENV_HOME)s/projects/voiceCLI/.venv/bin:/usr/local/bin:/usr/bin:/bin:/mnt/c/Windows/system32",WSL_INTEROP="%(ENV_WSL_INTEROP)s"
autostart=true
autorestart=true
startsecs=15
startretries=3
stopwaitsecs=10
stopasgroup=true
killasgroup=true
stdout_logfile=%(ENV_HOME)s/projects/voiceCLI/supervisor/logs/voicecli_stt.log
stdout_logfile_maxbytes=5MB
stdout_logfile_backups=3
stderr_logfile=%(ENV_HOME)s/projects/voiceCLI/supervisor/logs/voicecli_stt_error.log
stderr_logfile_maxbytes=5MB
stderr_logfile_backups=3
